name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install clasp globally
        run: npm install -g @google/clasp

      - name: Build
        run: npm run build

      - name: Restore clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
          CLASP_JSON: ${{ secrets.CLASP_JSON }}
        run: |
          echo "$CLASPRC_JSON" > "$HOME/.clasprc.json"
          echo "$CLASPRC_JSON" > .clasprc.json
          echo "$CLASP_JSON" > .clasp.json
          ls -la "$HOME/.clasprc.json" .clasprc.json .clasp.json

      - name: Deploy to GAS
        env:
          DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          clasp push
          clasp version "deploy from GitHub Actions"
          clasp deploy --deploymentId "$DEPLOYMENT_ID" -d "Production"
