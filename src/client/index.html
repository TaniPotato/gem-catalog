<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チームGemカタログ</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">🔮 <span>Gem</span> カタログ</h1>
      <button class="btn btn-primary" id="openModalBtn">＋ 登録</button>
    </div>
  </header>

  <main class="main">

    <section class="controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="キーワードで検索..."
        />
      </div>

      <div class="filter-row">
        <div class="tag-filters" id="tagFilters">
          <button class="tag-btn active" data-tag="">すべて</button>
        </div>
        <div class="sort-buttons">
          <button class="sort-btn active" id="sortNew">新着順</button>
          <button class="sort-btn" id="sortPopular">人気順</button>
        </div>
      </div>
    </section>

    <div class="section-header">
      <span class="section-title">登録済みのGem</span>
      <span class="section-count" id="sectionCount"></span>
    </div>

    <div id="loading" class="loading">読み込み中...</div>

    <div class="card-grid" id="cardGrid">
      <div id="emptyState" class="empty-state" hidden>
        <p>まだGemが登録されていません。<br/>最初のGemを登録してみましょう！</p>
      </div>
    </div>

  </main>

  <!-- 登録 / 編集モーダル -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新しいGemを登録</h2>
        <button class="modal-close" id="closeModalBtn" aria-label="閉じる">✕</button>
      </div>
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="gemName">Gem名<span class="required">*</span></label>
          <input type="text" id="gemName" class="form-input" placeholder="例：議事録作成くん" />
          <span class="error-msg" id="gemNameError"></span>
        </div>
        <div class="form-group">
          <label for="gemDescription">説明</label>
          <textarea id="gemDescription" class="form-input" rows="3" placeholder="どんなことができるGemか説明してください"></textarea>
        </div>
        <div class="form-group">
          <label for="gemUrl">URL<span class="required">*</span></label>
          <input type="url" id="gemUrl" class="form-input" placeholder="https://gemini.google.com/..." />
          <span class="error-msg" id="gemUrlError"></span>
        </div>
        <div class="form-group">
          <label>タグ</label>
          <div class="tag-input-field" id="tagInputField">
            <div class="tag-chips" id="tagChips"></div>
            <input
              type="text"
              id="tagTextInput"
              class="tag-text-input"
              placeholder="タグを入力してEnter"
              autocomplete="off"
            />
          </div>
          <input type="hidden" id="gemTags" />
        </div>
        <div class="form-group">
          <label for="gemAuthor">Gem作成者<span class="required">*</span></label>
          <input type="text" id="gemAuthor" class="form-input" placeholder="例：田中" />
          <span class="error-msg" id="gemAuthorError"></span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelModalBtn">キャンセル</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">登録する</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
